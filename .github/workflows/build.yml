name: Yocto Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace info
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -al

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gawk wget git diffstat unzip texinfo gcc build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect \
            xz-utils debianutils iputils-ping file tree

      - name: Clone poky (kirkstone)
        run: |
          git clone --depth 1 -b kirkstone git://git.yoctoproject.org/poky

      # Cache downloads (big speed improvement)
      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: poky/downloads
          key: yocto-downloads-${{ runner.os }}

      # Cache sstate (huge speed improvement)
      - name: Cache sstate
        uses: actions/cache@v4
        with:
          path: poky/sstate-cache
          key: yocto-sstate-${{ runner.os }}

          
      - name: Setup build environment
        run: |
          cd poky
          source oe-init-build-env build

          echo 'DL_DIR = "${TOPDIR}/../downloads"' >> conf/local.conf
          echo 'SSTATE_DIR = "${TOPDIR}/../sstate-cache"' >> conf/local.conf
          echo 'BB_NUMBER_THREADS = "4"' >> conf/local.conf
          echo 'PARALLEL_MAKE = "-j4"' >> conf/local.conf
          echo 'DISTRO_FEATURES:append = " ptest"' >> conf/local.conf
          echo 'EXTRA_IMAGE_FEATURES += "ptest-pkgs"' >> conf/local.conf
          
          bitbake-layers add-layer ../../meta-mathutils

      - name: Build mathutils
        run: |
          cd poky
          source oe-init-build-env build
          #bitbake mathutils
          echo 'IMAGE_INSTALL:append = " mathutils"' >> conf/local.conf
          bitbake core-image-minimal

      - name: Boot QEMU and run runtime test
        run: |
          cd poky
          source oe-init-build-env build

          echo "Starting QEMU test..."

          expect << 'EOF'
          set timeout 120
          spawn runqemu qemux86-64 nographic

          expect "login:"
          send "root\r"

          expect "#"
          send "mathutils_app\r"

          expect {
              "2 + 3 = 5" {
                  puts "Runtime test PASSED"
              }
              timeout {
                  puts "Runtime test FAILED"
                  exit 1
              }
          }

          send "poweroff\r"
          expect eof
          EOF


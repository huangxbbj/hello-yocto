name: Yocto Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout meta-mathutils
        uses: actions/checkout@v4

      - name: Print workspace info
        run: |
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          echo "Contents of workspace:"
          ls -l $GITHUB_WORKSPACE

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gawk wget git diffstat unzip texinfo gcc build-essential \
            chrpath socat cpio python3 python3-pip python3-pexpect \
            xz-utils debianutils iputils-ping file

      - name: Clone poky (kirkstone)
        run: |
          git clone git://git.yoctoproject.org/poky -b kirkstone

      - name: Print workspace info
        run: |
          echo "GITHUB_WORKSPACE = $GITHUB_WORKSPACE"
          echo "Contents of workspace:"
          ls -l $GITHUB_WORKSPACE
  
      - name: Add layer and build
        run: |
          mv $GITHUB_WORKSPACE/meta-mathutils poky/meta-mathutils
          cd poky
          source oe-init-build-env build
          bitbake-layers add-layer ../meta-mathutils
          bitbake mathutils

      - name: Print build info
        run: |
          echo "Contents of build:"
          ls -l build/tmp/work/core2-64-poky-linux/mathutils/1.0-r0/
  
      - name: Upload mathutils binary
        uses: actions/upload-artifact@v4
        with:
          name: mathutils_app
          path: poky/build/tmp/work/*/mathutils/*/image/usr/bin/mathutils_app

    
